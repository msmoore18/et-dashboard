name: Update ET data

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scripts/scrape_et.py

      - name: Commit updated data (if changed)
        run: |
          git config user.name "et-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/et_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update ET data $(date -u +%Y-%m-%d)"
            git push
          fi
