<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ET — Past 7 Days</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f7f7f5;
    margin: 0;
    padding: 16px 14px 36px;
    color: #2a2a28;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 480px; margin: 0 auto; }

  h1 { font-size: 20px; margin: 4px 0 2px; font-weight: 700; }
  .updated { font-size: 12px; color: #9a9a93; margin-bottom: 16px; }

  .banner {
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 18px;
    color: #fff;
  }
  .banner .headline { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .banner .detail { font-size: 13px; line-height: 1.5; opacity: 0.95; }
  .banner.increase { background: linear-gradient(135deg, #c2622a, #a8472a); }
  .banner.hold     { background: linear-gradient(135deg, #3a7d3a, #2f6b32); }
  .banner.ease     { background: linear-gradient(135deg, #3d6e96, #2c5578); }

  .day-list { display: flex; flex-direction: column; gap: 8px; }
  .day-row {
    display: flex;
    align-items: center;
    background: #fff;
    border-radius: 12px;
    padding: 12px 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .day-date { width: 64px; flex-shrink: 0; }
  .day-date .dow { font-size: 12px; color: #9a9a93; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
  .day-date .md { font-size: 15px; font-weight: 700; }
  .day-temp { font-size: 11px; color: #b0b0a8; margin-top: 1px; }

  .eto-chip {
    flex: 1;
    margin: 0 10px;
    text-align: center;
    border-radius: 10px;
    padding: 8px 6px;
    font-weight: 700;
    font-size: 16px;
  }
  .eto-chip .unit { font-size: 10px; font-weight: 500; display: block; margin-top: 1px; opacity: 0.85; }
  .eto-low   { background: #e3f0ee; color: #2a7d72; }
  .eto-mod   { background: #ecf2df; color: #5a8f3c; }
  .eto-high  { background: #fbe8d6; color: #c2622a; }
  .eto-vhigh { background: #fadcdc; color: #b0392f; }
  .eto-pending { background: #f0eee8; color: #aaa89f; font-weight: 500; font-size: 13px; }

  .precip-badge {
    width: 60px; flex-shrink: 0; text-align: right;
    font-size: 12px; font-weight: 600;
  }
  .precip-badge.wet { color: #2a6fa3; }
  .precip-badge.dry { color: #c4c4bc; font-weight: 500; }

  .legend { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0 6px; font-size: 11px; color: #8a8a84; }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  .footer-link {
    display: block; text-align: center; margin-top: 22px;
    font-size: 12.5px; color: #9a9a93; text-decoration: none;
  }
  .footer-link:active { color: #6b6b66; }

  .empty-state { text-align: center; padding: 50px 20px; color: #6b6b66; }
  .empty-state h2 { font-size: 16px; margin-bottom: 8px; }
  .empty-state p { font-size: 13px; line-height: 1.6; }
  code { background: #ece9e2; padding: 2px 5px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>
<div class="wrap" id="root">
  <h1>Past 7 Days</h1>
  <p class="updated">Loading&hellip;</p>
</div>

<script>
const DATA_URL = './data/et_data.json';

// ---- Tunable assumptions, documented so future-you can adjust them ----
// Turf coefficient (Kc) x south-exposure/wind adjustment, midpoint estimate.
const DEMAND_MULTIPLIER = 0.84;
// Weekly water applied by the current 75-min every-other-day cycle-soak
// schedule, at an estimated ~0.4 in/hr nozzle output (Hunter I-20, 3.5-4.0 nozzles).
const APPLIED_PER_WEEK = 1.75;

fetch(DATA_URL)
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(records => {
    if (!records || records.length === 0) throw new Error('empty');
    render(records);
  })
  .catch(() => {
    document.getElementById('root').innerHTML = `
      <h1>Past 7 Days</h1>
      <div class="empty-state">
        <h2>No data yet</h2>
        <p>This page reads <code>data/et_data.json</code>, which the daily
        GitHub Action creates. If you just set this up, run the workflow once
        manually from the Actions tab.</p>
      </div>`;
  });

function render(records) {
  const sorted = records.filter(r => r.date).sort((a,b) => a.date < b.date ? -1 : 1);
  const last7 = sorted.slice(-7);
  const latestDate = last7[last7.length - 1].date;

  // Only count days that actually have a finalized ETo reading - the station
  // typically lags a day or two on ET calculations, so the most recent day(s)
  // often show up as null rather than 0. Treating "no data yet" as "zero
  // water demand" would understate the week and risk under-watering.
  const validEtoDays = last7.filter(r => r.eto !== null && r.eto !== undefined);
  const missingCount = last7.length - validEtoDays.length;
  const sumEtoValid = validEtoDays.reduce((s,r) => s + r.eto, 0);
  const avgEtoValid = validEtoDays.length ? sumEtoValid / validEtoDays.length : 0;
  const projectedWeekEto = avgEtoValid * 7; // extrapolate the known rate across a full week

  const validPrecipDays = last7.filter(r => r.precip !== null && r.precip !== undefined);
  const sumPrecip = validPrecipDays.reduce((s,r) => s + r.precip, 0);

  const estimatedNeed = projectedWeekEto * DEMAND_MULTIPLIER;
  const netNeed = Math.max(0, estimatedNeed - sumPrecip);
  const ratio = netNeed / APPLIED_PER_WEEK;

  const completenessNote = missingCount > 0
    ? ` (based on ${validEtoDays.length} of 7 days — the most recent ${missingCount} day${missingCount>1?'s':''} haven't been finalized by the station yet)`
    : '';

  let bannerClass, headline, detail;
  if (ratio > 1.10) {
    bannerClass = 'increase';
    headline = '⬆️ Consider bumping up watering';
    detail = `This week's estimated water need is ~${netNeed.toFixed(2)} in${completenessNote}` +
      (sumPrecip > 0 ? `, after crediting ${sumPrecip.toFixed(2)} in of rain` : '') +
      `, vs. ~${APPLIED_PER_WEEK.toFixed(2)} in applied at 75 min every-other-day. ` +
      `That's running ${Math.round((ratio-1)*100)}% above your current schedule.`;
  } else if (ratio < 0.80) {
    bannerClass = 'ease';
    headline = '⬇️ You could ease off slightly';
    detail = `This week's estimated need is ~${netNeed.toFixed(2)} in${completenessNote}` +
      (sumPrecip > 0 ? `, after crediting ${sumPrecip.toFixed(2)} in of rain` : '') +
      `, vs. ~${APPLIED_PER_WEEK.toFixed(2)} in applied. Given how dry this season has run overall, ` +
      `I'd want to see this hold for a couple weeks before actually cutting back.`;
  } else {
    bannerClass = 'hold';
    headline = '✅ On track — hold at 75 min every-other-day';
    detail = `This week's estimated need is ~${netNeed.toFixed(2)} in${completenessNote}` +
      (sumPrecip > 0 ? `, after crediting ${sumPrecip.toFixed(2)} in of rain` : '') +
      `, close to the ~${APPLIED_PER_WEEK.toFixed(2)} in your current schedule applies. No change needed.`;
  }

  function etoClass(v) {
    if (v === null || v === undefined) return 'eto-pending';
    if (v < 0.10) return 'eto-low';
    if (v < 0.18) return 'eto-mod';
    if (v < 0.25) return 'eto-high';
    return 'eto-vhigh';
  }

  const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const rowsHtml = last7.slice().reverse().map(r => {
    const d = new Date(r.date + 'T00:00:00');
    const dow = dows[d.getDay()];
    const md = (d.getMonth()+1) + '/' + d.getDate();
    const eto = r.eto;
    const precip = r.precip || 0;
    const maxTemp = r.maxTemp;
    return `
      <div class="day-row">
        <div class="day-date">
          <div class="dow">${dow}</div>
          <div class="md">${md}</div>
          ${maxTemp != null ? `<div class="day-temp">${Math.round(maxTemp)}°F</div>` : ''}
        </div>
        <div class="eto-chip ${etoClass(eto)}">
          ${eto != null ? eto.toFixed(2) : 'pending'}
          <span class="unit">${eto != null ? 'in/day ETo' : 'not finalized yet'}</span>
        </div>
        <div class="precip-badge ${precip > 0 ? 'wet' : (r.precip == null ? 'dry' : 'dry')}">
          ${r.precip == null ? '—' : (precip > 0 ? '💧 ' + precip.toFixed(2) + ' in' : 'no rain')}
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('root').innerHTML = `
    <h1>Past 7 Days</h1>
    <p class="updated">Carbondale CBL01 &middot; through ${latestDate}</p>

    <div class="banner ${bannerClass}">
      <div class="headline">${headline}</div>
      <div class="detail">${detail}</div>
    </div>

    <div class="day-list">${rowsHtml}</div>

    <div class="legend">
      <span><span class="dot" style="background:#2a7d72"></span>Low ET</span>
      <span><span class="dot" style="background:#5a8f3c"></span>Moderate</span>
      <span><span class="dot" style="background:#c2622a"></span>High</span>
      <span><span class="dot" style="background:#b0392f"></span>Very high</span>
      <span><span class="dot" style="background:#aaa89f"></span>Not finalized yet</span>
    </div>

    <a class="footer-link" href="./full.html">Full multi-year chart &amp; zoom →</a>
  `;
}
</script>
</body>
</html>
